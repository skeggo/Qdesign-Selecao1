name: Container Security Scan (Trivy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Scan Dockerfiles for misconfigurations ──────────────────────────────────
  scan-config:
    name: Dockerfile misconfiguration scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # don't fail the build, just report

      - name: Upload config scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ── Build and scan each image for CVEs ─────────────────────────────────────
  scan-images:
    name: Image CVE scan — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend-core
            context: backend/Core
            dockerfile: backend/Core/Dockerfile
          - service: ui
            context: ui
            dockerfile: ui/Dockerfile
          - service: knowledge-service
            context: backend/Services/knowledge_service
            dockerfile: backend/Services/knowledge_service/Dockerfile
          - service: retrieval-service
            context: backend/Services/retrieval_service
            dockerfile: backend/Services/retrieval_service/Dockerfile
          - service: co-scientist-service
            context: backend/Services/co_scientist_service
            dockerfile: backend/Services/co_scientist_service/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t qdesign/${{ matrix.service }}:${{ github.sha }} \
            ${{ matrix.context }}

      - name: Scan ${{ matrix.service }} image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: qdesign/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # set to "1" to fail the build on HIGH/CRITICAL CVEs

      - name: Upload ${{ matrix.service }} scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
