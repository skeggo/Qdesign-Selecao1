services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  qdrant:
    build:
      context: XQdrant
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  # ── Backend Core (NestJS) ───────────────────────────────────────────────────
  backend-core:
    build:
      context: backend/Core
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - backend/Core/.env
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongo:27017/qdesign
      RETRIEVE_API_URL: http://retrieval-service:8002
      AI_COSCIENTIST_API_URL: http://co-scientist-service:8003
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
    depends_on:
      - mongo

  # ── Python Microservices ────────────────────────────────────────────────────
  knowledge-service:
    build:
      context: backend/Services/knowledge_service
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - backend/Services/knowledge_service/.env
    environment:
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - qdrant

  retrieval-service:
    build:
      context: backend/Services/retrieval_service
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - backend/Services/retrieval_service/.env
    environment:
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - qdrant

  co-scientist-service:
    build:
      context: backend/Services/co_scientist_service
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - backend/Services/co_scientist_service/.env
    environment:
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      - qdrant

  # ── Frontend (Next.js + Socket server) ─────────────────────────────────────
  ui:
    build:
      context: ui
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3002
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      SOCKET_PORT: 3002
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend-core

volumes:
  mongo_data:
  qdrant_data:
